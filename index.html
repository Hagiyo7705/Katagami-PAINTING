<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATAGAMI PAINTING</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #495057;
            --background-color: #f4f7f9;
            --text-color: #212529;
            --border-color: #adb5bd;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
            font-size: 18px; /* 기본 글자 크기 확대 */
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            min-height: 70vh; /* 세로 화면 70% 이상 채우기 */
        }

        h2 {
            margin: 0 0 25px 0;
            font-size: 28px;
            color: var(--primary-color);
            text-align: center;
            text-transform: uppercase;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--secondary-color);
            font-size: 18px;
        }

        select {
            width: 100%;
            padding: 18px;
            margin-bottom: 30px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: #fff;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 16px;
            text-align: left;
            font-size: 18px;
        }

        th {
            background-color: #e9ecef;
            color: #333;
            font-weight: 600;
        }

        #paint-table tfoot th,
        #paint-table tfoot td {
            font-weight: bold;
            background-color: #f1f3f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            h2 { font-size: 24px; }
            select, th, td { font-size: 16px; padding: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KATAGAMI PAINTING</h2>
    <label for="itemSelect">SELECT ITEM:</label>
    <select id="itemSelect" onchange="updateDetails()">
        <option value="">-- SELECT --</option>
        <option value="1">1. TP Flange Contact surface (Top)</option>
        <option value="2">2. TP Flange Fastner contact surface(Bottom)</option>
        <option value="3">3. TP Flange Bolt holes</option>
        <option value="4">4. Davit Crane and other flanges</option>
        <option value="5">5. Flange Outside mating Areas</option>
        <option value="6">6. Sea fastening Flange</option>
        <option value="7">7. TP</option>
        <option value="8">8. TP Marking</option>
        <option value="9">9. TP</option>
        <option value="10">10. TP</option>
        <option value="14">14. External Platform</option>
        <option value="15">15. External Platform Top Surface</option>
        <option value="16">16. Platform Laydown Push on profile at W2W Gates</option>
        <option value="17">17. Platform Laydown Area</option>
        <option value="18">18. Upper Access Ladder</option>
        <option value="19">19. Rest Platform</option>
        <option value="20">20. Boat Landing</option>
        <option value="21">21. Horizontal Jack Support</option>
        <option value="22">22. Flange Access platform</option>
        <option value="23">23. Equipment Platform</option>
        <option value="24">24. Airtight Platform Upper surface</option>
        <option value="25">25. Airtight Platform Upper surface (walkable area)</option>
        <option value="26">26. Airtight Platform Bottom surface</option>
        <option value="27">27. Lower Work Platform</option>
        <option value="28">28. Internal Ladders</option>
    </select>

    <table id="detailsTable">
        <tr><th>NORSOK SYSTEM NO.</th><td id="norsok">-</td></tr>
        <tr><th>COATING SYSTEM NO.</th><td id="sysNo">-</td></tr>
    </table>

    <table id="paint-table">
        <thead>
            <tr><th>PAINT BRAND</th><th>DFT (UM)</th></tr>
        </thead>
        <tbody id="paintBody">
            <!-- Data will be injected here -->
        </tbody>
        <tfoot>
            <tr><th>TOTAL</th><td id="total">0</td></tr>
        </tfoot>
    </table>
</div>

<script>
    const data = {
        "1": { norsok: "-", sysNo: "1", paints: [["TSZA", "100"]], total: "100" },
        "2": { norsok: "-", sysNo: "2", paints: [["TSZA", "100"], ["INTERGARD 269 GREY", "20"]], total: "120" },
        "3": { norsok: "-", sysNo: "3", paints: [["INTERZINC 52", "50"]], total: "50" },
        "4": { norsok: "-", sysNo: "4", paints: [["TSZA", "100"]], total: "-" },
        "5": { norsok: "-", sysNo: "5", paints: [["TSZA", "100"], ["INTERGARD 269 GREY", "30+X"]], total: "130+X" },
        "6": { norsok: "7A", sysNo: "6", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1060" },
        "7": { norsok: "7A", sysNo: "7", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1060" },
        "8": { norsok: "7A", sysNo: "8", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 9005", "60"]], total: "1060" },
        "9": { norsok: "1B", sysNo: "9", paints: [["INTERZINC 52E", "60"], ["INTERGARD 475HS GREY", "180"], ["INTERTHANE 990E RAL 7035", "60"]], total: "300" },
        "10": { norsok: "7A", sysNo: "10", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"]], total: "1000" },
        "14": { norsok: "7A", sysNo: "14", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1060" },
        "15": { norsok: "7A", sysNo: "15", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERZONE 1000 (7035)+nonslip", "180"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1240" },
        "16": { norsok: "7A", sysNo: "16", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 3020", "60"]], total: "1060" },
        "17": { norsok: "7A", sysNo: "17", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 3020", "60"]], total: "1060" },
        "18": { norsok: "7A", sysNo: "18", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1060" },
        "19": { norsok: "7A", sysNo: "19", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1060" },
        "20": { norsok: "7A", sysNo: "20", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"], ["INTERTHANE 990E RAL 1023", "60"]], total: "1060" },
        "21": { norsok: "7B", sysNo: "21", paints: [["INTERZONE 954", "175"], ["INTERZONE 954 RAL7035", "175"]], total: "350" },
        "22": { norsok: "-", sysNo: "22", paints: [["HDG", "100"]], total: "100" },
        "23": { norsok: "-", sysNo: "23", paints: [["HDG", "100"]], total: "100" },
        "24": { norsok: "1B", sysNo: "24", paints: [["INTERZINC 52E", "60"], ["INTERGARD 475HS GREY", "180"], ["INTERTHANE 990E RAL 7035", "60"]], total: "300" },
        "25": { norsok: "1B", sysNo: "25", paints: [["INTERZINC 52E", "60"], ["INTERGARD 475HS GREY", "180"], ["INTERGARD 475HS+nonslip", "180"], ["INTERTHANE 990E RAL 7035", "60"]], total: "480" },
        "26": { norsok: "7A", sysNo: "26", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"]], total: "1000" },
        "27": { norsok: "7A", sysNo: "27", paints: [["INTERZONE 1000 GREY", "500"], ["INTERZONE 1000 RAL 7035", "500"]], total: "1000" },
        "28": { norsok: "-", sysNo: "28", paints: [["HDG", "100"]], total: "100" }
    };


    function updateDetails() {
        const id = document.getElementById('itemSelect').value;
        const norsokCell = document.getElementById('norsok');
        const sysNoCell = document.getElementById('sysNo');
        const paintBody = document.getElementById('paintBody');
        const totalCell = document.getElementById('total');

        if (!id) {
            norsokCell.innerText = "-";
            sysNoCell.innerText = "-";
            paintBody.innerHTML = "";
            totalCell.innerText = "0";
            return;
        }

        const item = data[id];
        norsokCell.innerText = item.norsok;
        sysNoCell.innerText = item.sysNo;
        totalCell.innerText = item.total;
        
        paintBody.innerHTML = item.paints.map(p => `<tr><td>${p[0]}</td><td>${p[1]}</td></tr>`).join('');
    }
</script>

</body>
</html>
